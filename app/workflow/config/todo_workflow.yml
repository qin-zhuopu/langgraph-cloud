name: todo_workflow
display_name: 任务执行流程
description: 任务执行流程

nodes:
  - id: start
    type: action
    display_name: 创建任务
    description: 任务初始化
    target_node: todo

  - id: todo
    type: interrupt
    display_name: 待办
    description: 任务待处理，等待开始
    transitions:
      - action: start
        label: 开始
        target_node: doing
        condition: action == "start"
        form_schema:
          type: object
          required:
            - action
            - note
          properties:
            action:
              type: string
              const: start
            note:
              type: string
              description: 备注

  - id: doing
    type: interrupt
    display_name: 进行中
    description: 任务执行中
    transitions:
      - action: complete
        label: 完成
        target_node: done
        condition: action == "complete"
        form_schema:
          type: object
          required:
            - action
            - note
            - progress
          properties:
            action:
              type: string
              const: complete
            note:
              type: string
              description: 备注
            progress:
              type: integer
              minimum: 0
              maximum: 100
              description: 进度百分比
      - action: pause
        label: 暂停
        target_node: todo
        condition: action == "pause"
        form_schema:
          type: object
          required:
            - action
            - note
          properties:
            action:
              type: string
              const: pause
            note:
              type: string
              description: 暂停原因

  - id: done
    type: terminal
    display_name: 已完成
    description: 任务执行完成
    status: completed
