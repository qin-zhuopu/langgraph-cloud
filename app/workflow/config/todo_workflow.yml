name: todo_workflow
display_name: 任务执行流程

nodes:
  - id: start
    type: action
    display_name: 创建任务
    description: 任务初始化
    next: todo

  - id: todo
    type: interrupt
    display_name: 待办
    description: 任务待处理，等待开始
    required_params:
      - action
      - note
    transitions:
      - condition: action == "start"
        next: doing

  - id: doing
    type: interrupt
    display_name: 进行中
    description: 任务执行中
    required_params:
      - action
      - note
      - progress
    transitions:
      - condition: action == "complete"
        next: done
      - condition: action == "pause"
        next: todo

  - id: done
    type: terminal
    display_name: 已完成
    description: 任务执行完成
    status: completed
