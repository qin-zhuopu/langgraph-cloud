name: purchase_request
display_name: 采购申请审批流程
description: 采购申请审批流程

nodes:
  - id: submit
    type: action
    display_name: 提交申请
    description: 用户提交采购申请
    target_node: manager_audit

  - id: manager_audit
    type: interrupt
    display_name: 经理审批
    description: 部门经理审批采购申请
    transitions:
      - action: approve
        label: 批准
        target_node: finance_audit
        condition: is_approved == true
        form_schema:
          type: object
          required:
            - is_approved
            - audit_opinion
            - approver
          properties:
            is_approved:
              type: boolean
              const: true
            audit_opinion:
              type: string
              minLength: 1
              description: 审批意见
            approver:
              type: string
              description: 审批人姓名
      - action: reject
        label: 驳回
        target_node: rejected
        condition: is_approved == false
        form_schema:
          type: object
          required:
            - is_approved
            - reject_reason
            - approver
          properties:
            is_approved:
              type: boolean
              const: false
            reject_reason:
              type: string
              minLength: 1
              description: 驳回原因
            approver:
              type: string
              description: 审批人姓名

  - id: finance_audit
    type: interrupt
    display_name: 财务审批
    description: 财务部门审批采购申请
    transitions:
      - action: approve
        label: 批准
        target_node: approved
        condition: is_approved == true
        form_schema:
          type: object
          required:
            - is_approved
            - audit_opinion
            - approver
          properties:
            is_approved:
              type: boolean
              const: true
            audit_opinion:
              type: string
              minLength: 1
              description: 审批意见
            approver:
              type: string
              description: 审批人姓名
      - action: reject
        label: 驳回
        target_node: rejected
        condition: is_approved == false
        form_schema:
          type: object
          required:
            - is_approved
            - reject_reason
            - approver
          properties:
            is_approved:
              type: boolean
              const: false
            reject_reason:
              type: string
              minLength: 1
              description: 驳回原因
            approver:
              type: string
              description: 审批人姓名

  - id: approved
    type: terminal
    display_name: 审批通过
    description: 采购申请已通过所有审批
    status: completed

  - id: rejected
    type: terminal
    display_name: 审批拒绝
    description: 采购申请被拒绝
    status: rejected
